<head>
<meta charset="UTF-8">

<title>Вход — Lunchtime</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
    box-sizing: border-box;
}

.auth-container {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    width: 400px;
    max-width: 100%;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    overflow: hidden;
    position: relative;
}

.auth-tabs {
    display: flex;
    position: relative;
    background: rgba(255, 255, 255, 0.95);
    padding: 5px;
    gap: 5px;
}

.tab {
    flex: 1;
    padding: 15px;
    border: none;
    background: transparent;
    color: #6B7280;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    border-radius: 12px;
}

.tab.active {
    color: #fff;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.forms-container {
    padding: 30px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group .icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #9CA3AF;
}

.input-group input {
    width: 100%;
    padding: 12px 12px 12px 44px;
    border: 1px solid #E5E7EB;
    border-radius: 12px;
    font-size: 16px;
    color: #1F2937;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.8);
}

.input-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    background: rgba(255, 255, 255, 0.95);
}

.checkbox-container {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.checkbox-container input[type="checkbox"] {
    margin-right: 8px;
}

.checkbox-container label {
    color: #6B7280;
    font-size: 14px;
}

button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
}

button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}

.forgot-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #6B7280;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s ease;
}

.forgot-link:hover {
    color: #667eea;
}
</style>
</head>
<body>
<div class="auth-container">
    <div class="auth-tabs">
        <button class="tab active" id="loginTab" onclick="showTab('login')">Вход</button>
        <button class="tab" id="registerTab" onclick="showTab('register')">Регистрация</button>
    </div>
    
    <div class="forms-container">
        <form id="loginForm" action="https://httpbin.org/post" method="POST">
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm0 2c-4.42 0-8 1.79-8 4v1c0 .55.45 1 1 1h14c.55 0 1-.45 1-1v-1c0-2.21-3.58-4-8-4z" fill="currentColor"/>
                    </svg>
                </span>
                <input type="text" name="login" placeholder="Ваш логин" required>
            </div>
            
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M16 8h-1V6c0-2.76-2.24-5-5-5S5 3.24 5 6v2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H7V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z" fill="currentColor"/>
                    </svg>
                </span>
                <input type="password" name="password" placeholder="Ваш пароль" required>
            </div>
            
            <div class="checkbox-container">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Запомнить меня</label>
            </div>
            
            <button type="submit">Войти</button>
            <a href="#" class="forgot-link">Забыли пароль?</a>
        </form>

        <form id="registerForm" action="https://httpbin.org/post" method="POST" style="display: none;">
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm0 2c-4.42 0-8 1.79-8 4v1c0 .55.45 1 1 1h14c.55 0 1-.45 1-1v-1c0-2.21-3.58-4-8-4z" fill="currentColor"/>
                    </svg>
                </span>
                <input type="text" name="username" placeholder="Имя пользователя" required>
            </div>
            
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M16 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H5v-2h4V5h2v4h4v2z" fill="currentColor"/>
                    </svg>
                </span>
                <input type="email" name="email" placeholder="Email адрес" required>
            </div>
            
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M16 8h-1V6c0-2.76-2.24-5-5-5S5 3.24 5 6v2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2z" fill="currentColor"/>
                    </svg>
                </span>
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            
            <div class="input-group">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M16 8h-1V6c0-2.76-2.24-5-5-5S5 3.24 5 6v2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2z" fill="currentColor"/>
                    </svg>
                </span>
                <input type="password" name="confirm_password" placeholder="Подтвердите пароль" required>
            </div>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</div>

<script>
function showTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('registerTab').classList.toggle('active', tab === 'register');
}
</script>
