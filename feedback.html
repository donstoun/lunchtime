            font-size: 24px;

        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);

            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;

            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
        }

            width: 100%;
            padding: 12px;

            position: relative;
            padding: 2em 0;
            text-align: center;

            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label for="message">Ваше сообщение</label>
            <textarea id="message" name="message" required placeholder="Опишите ваше впечатление или проблему"></textarea>
        </div>
        
        <div class="file-input">
            <label for="file">
                Прикрепить файл<br>
                <small style="color: #6B7280;">Перетащите файл сюда или нажмите для выбора</small>
            </label>
            <input type="file" id="file" name="file">
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="consent" name="consent" required>
            <label for="consent">Я даю согласие на обработку моих персональных данных в соответствии с условиями предоставления услуг</label>
        </div>
        
        <button type="submit">Отправить отзыв</button>
    </form>
</div>
</body>
</html>
